<!DOCTYPE html>
<html>
<head>
  <title>Evidencias</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      color: white;
      cursor: pointer;
    }

    .btn-camara {
      background: #28a745;
    }

    .btn-pdf {
      background: #007bff;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
    }

    #estado {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }

    /* ocultamos input */
    #foto {
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>📦 Evidencias</h2>

  <div class="card">

    <input type="text" id="pedido" placeholder="Pedido">
    <input type="text" id="cliente" placeholder="Cliente">
    <input type="text" id="chofer" placeholder="Chofer">
    <input type="text" id="placas" placeholder="Placas">
    <input type="text" id="valido" placeholder="Válido">

    <!-- INPUT OCULTO -->
    <input type="file" id="foto" accept="image/*">

    <button class="btn-camara" onclick="abrirCamara()">📷 Tomar / Elegir Foto</button>
    <button class="btn-pdf" onclick="pdf()">📄 Ver PDF</button>

    <p id="estado">Fotos: 0</p>

  </div>

</div>

<script>
function abrirCamara() {
  document.getElementById("foto").click();
}

// cuando el usuario toma o elige foto
document.getElementById("foto").addEventListener("change", subir);

async function subir() {
  const pedido = document.getElementById("pedido").value;
  const file = document.getElementById("foto").files[0];

  if (!pedido) {
    alert("Pedido requerido");
    return;
  }

  if (!file) return;

  const fd = new FormData();

  fd.append("cliente", document.getElementById("cliente").value);
  fd.append("chofer", document.getElementById("chofer").value);
  fd.append("placas", document.getElementById("placas").value);
  fd.append("valido", document.getElementById("valido").value);
  fd.append("fotos", file);

  try {
    const res = await fetch(`/api/pedido/${pedido}/fotos`, {
      method: "POST",
      body: fd
    });

    const data = await res.json();

    document.getElementById("estado").innerText =
      "Fotos: " + data.pedido.fotos.length;

    alert("Foto subida ✔");

    document.getElementById("foto").value = "";

  } catch (e) {
    alert("Error al subir");
  }
}

function pdf() {
  const pedido = document.getElementById("pedido").value;
  if (!pedido) return alert("Ingresa pedido");

  window.open(`/api/pedido/${pedido}/pdf`, "_blank");
}
</script>

</body>
</html>
