<!DOCTYPE html>
<html>
<head>
  <title>Evidencias</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h2>Subir Evidencia</h2>

<input type="text" id="pedido" placeholder="Pedido"><br><br>
<input type="text" id="cliente" placeholder="Cliente"><br><br>
<input type="text" id="chofer" placeholder="Chofer"><br><br>
<input type="text" id="placas" placeholder="Placas"><br><br>
<input type="text" id="valido" placeholder="Valido"><br><br>

<input type="file" id="foto" accept="image/*"><br><br>

<button onclick="subirFoto()">📷 Subir Foto</button>
<button onclick="verPDF()">📄 Ver PDF</button>

<p id="estado">Fotos subidas: 0</p>

<script>
async function subirFoto() {
  const pedido = document.getElementById("pedido").value;
  const file = document.getElementById("foto").files[0];

  if (!pedido) return alert("Ingresa pedido");
  if (!file) return alert("Selecciona foto");

  const formData = new FormData();

  formData.append("cliente", document.getElementById("cliente").value);
  formData.append("chofer", document.getElementById("chofer").value);
  formData.append("placas", document.getElementById("placas").value);
  formData.append("valido", document.getElementById("valido").value);
  formData.append("fotos", file);

  const res = await fetch(`/api/pedido/${pedido}/fotos`, {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  document.getElementById("estado").innerText =
    "Fotos subidas: " + data.pedido.fotos.length;

  alert("Foto subida ✔");

  document.getElementById("foto").value = "";
}

function verPDF() {
  const pedido = document.getElementById("pedido").value;
  window.open(`/api/pedido/${pedido}/pdf`, "_blank");
}
</script>

</body>
</html>
