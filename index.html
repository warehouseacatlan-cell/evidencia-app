<!DOCTYPE html>
<html>
<head>
  <title>Evidencias</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      border: none;
      color: white;
      cursor: pointer;
    }

    .btn-camara {
      background: #28a745;
    }

    .btn-galeria {
      background: #6c757d;
    }

    .btn-pdf {
      background: #007bff;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
    }

    #estado {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }

    /* ocultamos inputs */
    #fotoCamara, #fotoGaleria {
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>📦 Evidencias</h2>

  <div class="card">

    <input type="text" id="pedido" placeholder="Pedido">
    <input type="text" id="cliente" placeholder="Cliente">
    <input type="text" id="chofer" placeholder="Chofer">
    <input type="text" id="placas" placeholder="Placas">
    <input type="text" id="valido" placeholder="Válido">

    <!-- INPUTS -->
    <input type="file" id="fotoCamara" accept="image/*" capture="environment">
    <input type="file" id="fotoGaleria" accept="image/*">

    <!-- BOTONES -->
    <button class="btn-camara" onclick="abrirCamara()">📷 Tomar Foto</button>
    <button class="btn-galeria" onclick="abrirGaleria()">🖼 Elegir de Galería</button>
    <button class="btn-pdf" onclick="pdf()">📄 Ver PDF</button>

    <p id="estado">Fotos: 0</p>

  </div>

</div>

<script>
function abrirCamara() {
  document.getElementById("fotoCamara").click();
}

function abrirGaleria() {
  document.getElementById("fotoGaleria").click();
}

async function subirArchivo(file) {
  const pedido = document.getElementById("pedido").value;

  if (!pedido) return alert("Pedido requerido");
  if (!file) return;

  const fd = new FormData();

  fd.append("cliente", document.getElementById("cliente").value);
  fd.append("chofer", document.getElementById("chofer").value);
  fd.append("placas", document.getElementById("placas").value);
  fd.append("valido", document.getElementById("valido").value);
  fd.append("fotos", file);

  try {
    const res = await fetch(`/api/pedido/${pedido}/fotos`, {
      method: "POST",
      body: fd
    });

    const data = await res.json();

    document.getElementById("estado").innerText =
      "Fotos: " + data.pedido.fotos.length;

    alert("Foto subida ✔");

  } catch (e) {
    alert("Error al subir ❌");
  }
}

// cámara
document.getElementById("fotoCamara").addEventListener("change", (e) => {
  subirArchivo(e.target.files[0]);
  e.target.value = "";
});

// galería
document.getElementById("fotoGaleria").addEventListener("change", (e) => {
  subirArchivo(e.target.files[0]);
  e.target.value = "";
});

function pdf() {
  const pedido = document.getElementById("pedido").value;
  if (!pedido) return alert("Ingresa pedido");

  window.open(`/api/pedido/${pedido}/pdf`, "_blank");
}
</script>

</body>
</html>
