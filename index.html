<!DOCTYPE html>
<html>
<head>
  <title>Evidencias</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h2>Evidencias</h2>

<input type="text" id="pedido" placeholder="Pedido"><br><br>
<input type="text" id="cliente" placeholder="Cliente"><br><br>
<input type="text" id="chofer" placeholder="Chofer"><br><br>
<input type="text" id="placas" placeholder="Placas"><br><br>
<input type="text" id="valido" placeholder="Valido"><br><br>

<input type="file" id="foto" accept="image/*"><br><br>

<button onclick="subir()">Subir Foto</button>
<button onclick="pdf()">Ver PDF</button>

<p id="estado"></p>

<script>
async function subir() {
  const pedido = document.getElementById("pedido").value;
  const file = document.getElementById("foto").files[0];

  if (!pedido) return alert("Pedido requerido");
  if (!file) return alert("Selecciona foto");

  const fd = new FormData();

  fd.append("cliente", document.getElementById("cliente").value);
  fd.append("chofer", document.getElementById("chofer").value);
  fd.append("placas", document.getElementById("placas").value);
  fd.append("valido", document.getElementById("valido").value);
  fd.append("fotos", file);

  const res = await fetch(`/api/pedido/${pedido}/fotos`, {
    method: "POST",
    body: fd
  });

  const data = await res.json();

  document.getElementById("estado").innerText =
    "Fotos: " + data.pedido.fotos.length;

  document.getElementById("foto").value = "";

  alert("Subida OK");
}

function pdf() {
  const pedido = document.getElementById("pedido").value;
  window.open(`/api/pedido/${pedido}/pdf`, "_blank");
}
</script>

</body>
</html>
