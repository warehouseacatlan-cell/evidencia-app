<!DOCTYPE html>
<html>
<head>
  <title>Prueba Pedido</title>
</head>
<body>

<h2>Crear Pedido</h2>

<button onclick="crearPedido()">Enviar Pedido</button>

<script>
function crearPedido() {
  fetch("https://evidencia-app-1.onrender.com/api/pedido", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      pedido: "001",
      cliente: "Bimbo",
      chofer: "Juan",
      placas: "ABC123",
      valido: "SI"
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("Respuesta: " + JSON.stringify(data));
  })
  .catch(err => {
    alert("Error: " + err);
  });
}
</script>

</body>
</html>
